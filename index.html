<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Repair of equipment from various brands</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <header class="header">
      <div class="header__title">
        <h1>Repair of equipment from various brands</h1>
      </div>
    </header>
    <div class="brands">
      <div class="brands__icon swiper">
        <div class="swiper-wrapper">
          <div class="swiper-slide">
            <button class="brands__icon1">
              <img
                src="task 7.4 img/Brand Card.png"
                id="brandcard"
                alt="lenovo-brand-icon"
              />
            </button>
          </div>
          <div class="swiper-slide">
            <button class="brands__icon2">
              <img
                src="task 7.4 img/Product Card.png"
                id="brandcard"
                alt="samsung"
              />
            </button>
          </div>
          <div class="swiper-slide">
            <button class="brands__icon3">
              <img
                src="task 7.4 img/Product Card (1).png"
                id="brandcard"
                alt="apple"
              />
            </button>
          </div>
          <div class="swiper-slide">
            <button class="brands__icon4">
              <img
                src="task 7.4 img/Brand card view sonic.png"
                id="brandcard"
                alt="viewsonic"
              />
            </button>
          </div>
          <div class="swiper-slide">
            <button class="brands__icon5">
              <img
                src="task 7.4 img/Product Card (2).png"
                id="brandcard"
                alt="bosch"
              />
            </button>
          </div>
          <div class="swiper-slide">
            <button class="brands__icon6">
              <img
                src="task 7.4 img/Product Card (3).png"
                id="brandcard"
                alt="hp"
              />
            </button>
          </div>
          <div class="swiper-slide">
            <button class="brands__icon7">
              <img
                src="task 7.4 img/Product Card (4).png"
                id="brandcard"
                alt="acer"
              />
            </button>
          </div>
          <div class="swiper-slide">
            <button class="brands__icon8">
              <img
                src="task 7.4 img/Brand Card SONY.png"
                id="brandcard"
                alt="sony"
              />
            </button>
          </div>
        </div>
        <div class="swiper-pagination"></div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
