<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Repair of equipment from various brands</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"
    />
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <header class="header">
      <div class="header__title">
        <h1>Repair of equipment from various brands</h1>
      </div>
    </header>
    <div class="brands">
      <input
        type="checkbox"
        id="expand-toggle"
        class="toggle-checkbox"
        hidden
      />
      <div class="brands__icon-container swiper">
        <div class="swiper-wrapper">
          <div class="swiper-slide extra1">
            <button class="brands__icon">
              <img src="task 7.4 img/Brand Card.png" alt="lenovo" />
            </button>
          </div>

          <div class="swiper-slide extra1">
            <button class="brands__icon">
              <img src="task 7.4 img/Product Card.png" alt="samsung" />
            </button>
          </div>

          <div class="swiper-slide extra1">
            <button class="brands__icon">
              <img src="task 7.4 img/Product Card (1).png" alt="apple" />
            </button>
          </div>

          <div class="swiper-slide">
            <button class="brands__icon">
              <img
                src="task 7.4 img/Brand card view sonic.png"
                alt="viewsonic"
              />
            </button>
          </div>

          <div class="swiper-slide">
            <button class="brands__icon">
              <img src="task 7.4 img/Product Card (2).png" alt="bosch" />
            </button>
          </div>

          <div class="swiper-slide">
            <button class="brands__icon">
              <img src="task 7.4 img/Product Card (3).png" alt="hp" />
            </button>
          </div>

          <div class="swiper-slide">
            <button class="brands__icon">
              <img src="task 7.4 img/Product Card (4).png" alt="acer" />
            </button>
          </div>

          <div class="swiper-slide extra">
            <button class="brands__icon">
              <img src="task 7.4 img/Brand Card SONY.png" alt="sony" />
            </button>
          </div>
        </div>

        <div class="swiper-pagination"></div>
      </div>
      <label for="expand-toggle" class="toggle-label"></label>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
